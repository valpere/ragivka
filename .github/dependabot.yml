version: 2
updates:
  # Go modules (go.mod)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions workflows (.github/workflows/)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Docker Compose images (docker/docker-compose.yml) — no Dockerfile in this
  # repo, so "docker-compose" is used instead of the "docker" ecosystem.
  - package-ecosystem: "docker-compose"
    directory: "/docker"
    schedule:
      interval: "weekly"
    ignore:
      # Redis 8.0 switched from the permissive Redis license to a choice of
      # RSALv2 / SSPLv1 / AGPLv3 (see PR #53, issue #65) — staying on the
      # 7.x line deliberately. Patch updates within 7-alpine still apply.
      - dependency-name: "redis"
        update-types: ["version-update:semver-major"]
